<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algnyte | Pro Leaderboard</title>
    <style>
        :root {
            --black: #050505;
            --orange: #ff5722;
            --red: #d32f2f;
            --yellow: #ffcc00;
            --dark-grey: rgba(25, 25, 25, 0.9);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: linear-gradient(45deg, #0f0000, #220000, #440a00, #0f0000);
            background-size: 400% 400%;
            animation: fireGradient 10s ease infinite;
        }

        @keyframes fireGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 {
            color: var(--yellow);
            font-size: 3rem;
            margin: 0;
            letter-spacing: 10px;
            text-shadow: 0 0 20px var(--red);
        }

        .scoreboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 900px) { .scoreboard-grid { grid-template-columns: repeat(2, 1fr); } }

        .team-card {
            background-color: var(--dark-grey);
            border: 1px solid rgba(255, 87, 34, 0.2);
            border-top: 3px solid var(--red);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        /* Leader Highlighting */
        .team-card:nth-child(1) { border-color: var(--yellow); box-shadow: 0 0 25px rgba(255, 204, 0, 0.3); }

        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.7rem;
            background: var(--red);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .team-name {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 800;
            margin-top: 10px;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 5px 0;
            outline: none;
            color: white;
        }

        .score-display:focus { color: var(--yellow); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .adjust-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            width: 40px;
            height: 30px;
            border-radius: 6px;
            font-size: 1.2rem;
        }

        .adjust-btn:hover { background: var(--orange); }

        .hint { margin-top: 40px; color: rgba(255,255,255,0.3); font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>ALGNYTE</h1>
        <div style="color: var(--orange); font-size: 0.8rem; letter-spacing: 5px;">LEADERBOARD</div>
    </header>

    <div class="scoreboard-grid" id="grid">
        </div>

    <p class="hint">Top scorers automatically move to the front</p>

    <script>
        const teamList = ["NINE SPARKS", "NOVAMELD", "ALGNYTE", "VECTORIX", "FORTE", "ALIF", "AVANCE", "DOMIN8"];
        const grid = document.getElementById('grid');

        // Create cards
        teamList.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'team-card';
            card.setAttribute('data-score', '0');
            card.id = `card-${name.replace(/\s/g, '')}`;

            card.innerHTML = `
                <div class="rank-badge">#0</div>
                <div class="team-name">${name}</div>
                <div class="score-display" contenteditable="true" onblur="manualUpdate(this)">0</div>
                <div class="controls">
                    <button class="adjust-btn" onclick="btnUpdate(this, -1)">-</button>
                    <button class="adjust-btn" onclick="btnUpdate(this, 1)">+</button>
                </div>
            `;
            grid.appendChild(card);
        });

        function btnUpdate(btn, amt) {
            const card = btn.closest('.team-card');
            const display = card.querySelector('.score-display');
            let score = parseInt(display.innerText) || 0;
            score = Math.max(0, score + amt);
            display.innerText = score;
            card.setAttribute('data-score', score);
            sortBoard();
        }

        function manualUpdate(el) {
            let score = parseInt(el.innerText) || 0;
            el.innerText = score;
            el.closest('.team-card').setAttribute('data-score', score);
            sortBoard();
        }

        // Sorting Logic (Highest Point First - Descending)
        function sortBoard() {
            const cards = Array.from(grid.querySelectorAll('.team-card'));
            
            cards.sort((a, b) => {
                const scoreA = parseInt(a.getAttribute('data-score'));
                const scoreB = parseInt(b.getAttribute('data-score'));
                return scoreB - scoreA; // Descending: B minus A
            });

            cards.forEach((card, index) => {
                // Update rank badge (1st, 2nd, etc.)
                card.querySelector('.rank-badge').innerText = `#${index + 1}`;
                grid.appendChild(card);
            });
        }

        // Initial sort to set ranks
        sortBoard();
    </script>
</body>
</html>
